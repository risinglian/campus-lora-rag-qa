### model
model_name_or_path: /root/autodl-tmp/llm_workspace/models/Qwen2.5-1.5B-Instruct
trust_remote_code: true

### method
stage: sft
do_train: true
finetuning_type: lora
lora_rank: 8
lora_alpha: 16
lora_dropout: 0.05
lora_target: all

### dataset
dataset_dir: /root/autodl-tmp/llm_workspace/data
dataset: campus_qa
template: qwen
cutoff_len: 1024
max_samples: 240
preprocessing_num_workers: 4
dataloader_num_workers: 2

### output
output_dir: /root/autodl-tmp/llm_workspace/outputs/qwen25-1.5b-campus-lora
logging_dir: /root/autodl-tmp/llm_workspace/logs/qwen25-1.5b-campus-lora
logging_steps: 5
save_steps: 50
plot_loss: true
overwrite_output_dir: false
save_only_model: false
report_to: none

### train
per_device_train_batch_size: 1
gradient_accumulation_steps: 8
learning_rate: 1.0e-4
num_train_epochs: 3.0
lr_scheduler_type: cosine
warmup_ratio: 0.05
bf16: true
ddp_timeout: 180000000
resume_from_checkpoint: null

### eval
val_size: 0.1
per_device_eval_batch_size: 1
eval_strategy: steps
eval_steps: 50
